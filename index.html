<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIMESTAMP PRO | 전문가용 카메라</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap');
        body { background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .capture-flash { animation: flash 0.2s ease-out; }
        @keyframes flash { 0% { background: white; opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col min-h-screen overflow-hidden">

    <div id="flash" class="fixed inset-0 z-50 pointer-events-none"></div>

    <div class="absolute top-0 w-full z-20 p-5 flex justify-between items-start pointer-events-none">
        <div class="bg-black/40 backdrop-blur-md border border-white/10 p-3 rounded-2xl pointer-events-auto">
            <div class="flex items-center gap-2 text-[10px] text-red-500 font-bold mb-1">
                <span class="flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                LIVE RECORDING
            </div>
            <div id="display-time" class="mono text-white text-lg font-bold">00:00:00</div>
        </div>
        <button class="bg-black/40 backdrop-blur-md p-3 rounded-full border border-white/10 pointer-events-auto text-white">
            <i data-lucide="settings-2"></i>
        </button>
    </div>

    <div class="relative flex-1 bg-zinc-900 flex items-center justify-center overflow-hidden">
        <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
        
        <div class="absolute bottom-8 left-6 text-white pointer-events-none drop-shadow-2xl">
            <div id="preview-date" class="text-3xl font-black italic tracking-tighter text-yellow-400">2026.03.03</div>
            <div id="preview-gps" class="text-xs font-medium opacity-80 mt-1 flex items-center gap-1">
                <i data-lucide="map-pin" class="w-3 h-3"></i> GPS 수신 대기 중...
            </div>
            <div id="preview-hash" class="mono text-[8px] opacity-40 mt-2 tracking-widest">HASH: UNKNOWN</div>
        </div>
    </div>

    <div class="h-44 bg-zinc-950 border-t border-white/5 flex items-center justify-around px-8 relative z-30">
        <div id="gallery-preview" class="w-14 h-14 bg-zinc-800 rounded-xl border border-white/10 flex items-center justify-center text-zinc-600 overflow-hidden">
            <i data-lucide="image" class="w-6 h-6"></i>
        </div>
        
        <button onclick="capture()" class="relative group">
            <div class="absolute -inset-4 bg-white/10 rounded-full blur-xl group-active:bg-white/20 transition-all"></div>
            <div class="w-20 h-20 bg-white rounded-full border-[6px] border-zinc-800 relative z-10 active:scale-90 transition-transform"></div>
        </button>

        <div class="w-14 h-14 flex items-center justify-center text-zinc-400">
            <i data-lucide="shield-check"></i>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const flash = document.getElementById('flash');
        let currentLoc = "Searching GPS...";

        // 1. 초기화 및 카메라 연결
        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                lucide.createIcons();
                initRealtime();
            } catch (err) {
                alert("오류: 카메라 권한이 필요합니다. (HTTPS 환경 필수)");
                console.error(err);
            }
        }

        // 2. 시간/GPS 실시간 업데이트
        function initRealtime() {
            setInterval(() => {
                const now = new Date();
                const timeStr = now.toTimeString().split(' ')[0];
                const dateStr = now.toISOString().split('T')[0].replace(/-/g, '.');
                
                document.getElementById('display-time').innerText = timeStr;
                document.getElementById('preview-date').innerText = dateStr + " " + timeStr;
                
                // 위변조 방지 해시 (고유성 증명용)
                const hash = btoa(dateStr + timeStr).substring(5, 15).toUpperCase();
                document.getElementById('preview-hash').innerText = "VERIFY-ID: " + hash;
            }, 1000);

            navigator.geolocation.watchPosition(p => {
                currentLoc = `${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
                document.getElementById('preview-gps').innerHTML = `<i data-lucide="map-pin" class="w-3 h-3"></i> LOC: ${currentLoc}`;
                lucide.createIcons();
            }, null, { enableHighAccuracy: true });
        }

        // 3. 고해상도 사진 촬영 및 합성
        function capture() {
            // 플래시 효과
            flash.classList.add('capture-flash');
            setTimeout(() => flash.classList.remove('capture-flash'), 200);

            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // 원본 캡처
            ctx.drawImage(video, 0, 0);

            // 워터마크 디자인 입히기
            const padding = canvas.width * 0.05;
            let y = canvas.height - padding;

            ctx.shadowColor = "black";
            ctx.shadowBlur = 15;
            ctx.textAlign = "left";

            // 해시코드
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.font = "bold 24px monospace";
            ctx.fillText(document.getElementById('preview-hash').innerText, padding, y);
            y -= 40;

            // GPS 정보
            ctx.fillStyle = "white";
            ctx.font = "bold 35px sans-serif";
            ctx.fillText("LOC: " + currentLoc, padding, y);
            y -= 60;

            // 날짜 및 시간
            ctx.fillStyle = "#fbbf24"; // 옐로우
            ctx.font = "italic black 70px sans-serif";
            ctx.fillText(document.getElementById('preview-date').innerText, padding, y);

            // 결과 저장
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = `TS_PRO_${Date.now()}.jpg`;
            link.href = dataUrl;
            link.click();

            // 갤러리 미리보기 업데이트
            document.getElementById('gallery-preview').innerHTML = `<img src="${dataUrl}" class="w-full h-full object-cover">`;
        }

        window.onload = start;
    </script>
</body>
</html>
