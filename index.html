<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노트북 완벽 작동 타임스탬프</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white min-h-screen flex flex-col items-center justify-center p-5">

    <div id="start-box" class="text-center">
        <h1 class="text-3xl font-black mb-6 text-yellow-500">PC/노트북 전용 버전</h1>
        <button onclick="runCamera()" class="px-10 py-5 bg-blue-600 rounded-2xl font-bold text-xl shadow-2xl active:scale-95 transition-all">
            카메라 연결 (클릭)
        </button>
        <p class="mt-4 text-zinc-500 text-sm">주소창 상단 '허용' 팝업을 꼭 눌러주세요!</p>
    </div>

    <div id="cam-container" class="hidden w-full max-w-2xl relative rounded-3xl overflow-hidden shadow-2xl border-4 border-zinc-700">
        <video id="webcam" autoplay playsinline class="w-full h-auto bg-black"></video>
        
        <div class="absolute bottom-5 left-5 text-left pointer-events-none drop-shadow-lg">
            <p id="time-display" class="text-2xl font-bold text-yellow-400">LOADING...</p>
            <p id="gps-display" class="text-xs text-white opacity-80 mt-1 italic">LOCATION WAITING...</p>
        </div>

        <button onclick="takeShot()" class="absolute bottom-5 right-5 w-16 h-16 bg-white rounded-full border-4 border-zinc-800 active:scale-90 transition-all flex items-center justify-center">
            <div class="w-12 h-12 rounded-full border-2 border-zinc-400"></div>
        </button>
    </div>

    <canvas id="out-canvas" class="hidden"></canvas>

    <script>
        const v = document.getElementById('webcam');
        const c = document.getElementById('out-canvas');

        async function runCamera() {
            try {
                // [수정] 노트북/폰 가리지 않고 가장 기본 카메라를 잡는 설정
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: true, // 단순히 true로 설정하면 노트북 웹캠이 바로 잡힙니다.
                    audio: false
                });

                v.srcObject = stream;
                
                v.onloadedmetadata = () => {
                    v.play();
                    document.getElementById('start-box').style.display = 'none';
                    document.getElementById('cam-container').classList.remove('hidden');
                };

                // 실시간 정보 업데이트
                setInterval(() => {
                    document.getElementById('time-display').innerText = new Date().toLocaleString();
                }, 1000);

                // 위치 정보 (노트북은 Wi-Fi 기반으로 잡힙니다)
                navigator.geolocation.getCurrentPosition(p => {
                    document.getElementById('gps-display').innerText = `LAT: ${p.coords.latitude.toFixed(4)} / LON: ${p.coords.longitude.toFixed(4)}`;
                }, (err) => {
                    document.getElementById('gps-display').innerText = "위치 정보 권한 필요";
                });

            } catch (err) {
                alert("카메라를 찾을 수 없습니다: " + err.message);
            }
        }

        function takeShot() {
            const ctx = c.getContext('2d');
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0);
            
            ctx.fillStyle = "yellow";
            ctx.font = "bold 40px Arial";
            ctx.fillText(document.getElementById('time-display').innerText, 30, c.height - 80);
            
            ctx.fillStyle = "white";
            ctx.font = "24px Arial";
            ctx.fillText(document.getElementById('gps-display').innerText, 30, c.height - 40);

            const link = document.createElement('a');
            link.download = `WEB_SHOT_${Date.now()}.jpg`;
            link.href = c.toDataURL('image/jpeg');
            link.click();
        }
    </script>
</body>
</html>
